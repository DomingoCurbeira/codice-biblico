<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Aposento | Ministración</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <meta property="og:title" content="El Aposento | Tiempo de Ministración">
    <meta property="og:description" content="¿Cómo está tu corazón hoy? Entra en un tiempo de oración guiada.">
    <meta property="og:image" content="img/social-share.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <link rel="icon" type="image/png" href="img/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="pantalla-inicio" class="container hidden">
        <header>
            <div class="header-top">
                <div class="brand-header">
                    <img src="img/logo.png" alt="Logo Lámpara" class="logo-glow">
                    <h1>El Aposento</h1>
                </div>

                <a href="../index.html" class="menu-launcher" title="Volver a Códice Bíblico">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z" fill="currentColor"></path>
                    </svg>
                </a>
            </div>
            
            <p class="subtitle">¿Cómo está tu corazón hoy?</p>
        </header>

        <audio id="musica-fondo" loop>
            <source src="audio/fondo.mp3" type="audio/mpeg">
        </audio>
        
        <div class="grid-emociones">
            <button onclick="cargarOracion('ansiedad')" class="btn-emocion">😰 Ansiedad</button>
            <button onclick="cargarOracion('perdon')" class="btn-emocion">❤️‍🩹 Rencor</button>
            <button onclick="cargarOracion('creacion')" class="btn-emocion">✨ Nuevo Comienzo</button>
        </div>
    </div>

    <div id="pantalla-oracion" class="container hidden">
        <nav>
            <button onclick="volverInicio()" class="btn-back">← Volver</button>
        </nav>

        <main class="card-oracion">
            <h2 id="titulo-oracion">Cargando...</h2>
            <p id="cita-biblica" class="cita">...</p>
            <div class="divider"></div>
            
            <div id="texto-oracion" class="texto-lectura">
                Selecciona un tema...
            </div>
        </main>
    </div>

    <div id="player-container" class="player-floating hidden">
        <button id="btn-play" class="btn-audio">
            ▶ Escuchar Ministración
        </button>
        <p id="estado-audio" class="status-text">Listo para orar</p>
    </div>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
