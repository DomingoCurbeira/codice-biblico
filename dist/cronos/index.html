<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronos | Mapa Bíblico Interactivo</title>
    
    <meta name="theme-color" content="#0a0e14">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/cronos-192.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>">

    <meta property="og:title" content="Cronos | Códice Bíblico">
    <meta property="og:description" content="Explora la geografía sagrada. Un mapa interactivo para viajar por los eventos y lugares de la Biblia.">
    <meta property="og:image" content="https://codicebiblico.netlify.app/img/og-cronos.jpg">
    <meta property="og:url" content="https://codicebiblico.netlify.app/cronos/index.html">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cronos | Mapa Bíblico">
    <meta name="twitter:description" content="Viaja a través de la historia bíblica con nuestro mapa interactivo.">

    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="map"></div>

    <div id="btn-retorno-estudio" class="hidden">
        <button onclick="retornarAOrigen()">
            <i class="fas fa-arrow-left"></i> Volver al Estudio: <span id="nombre-origen"></span>
        </button>
    </div>

    

    <div class="search-container">
    
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Buscar lugar, era o evento..." autocomplete="off">
        </div>

        <div class="ecosystem-nav-container">
            <button id="btn-launcher" class="btn-launcher" aria-label="Abrir Ecosistema">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm6 0h4v4h-4V4zM4 10h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4zM4 16h4v4H4v-4zm6 0h4v4h-4v-4zm6 0h4v4h-4v-4z"/>
                </svg>
            </button>

            <div id="eco-menu" class="eco-menu hidden">
                <div class="menu-grid">
                    <a href="../juego/index.html" class="menu-item">
                        <span class="icon">🛡️</span>
                        <span>Virtus</span>
                    </a>
                    <a href="../mana/index.html" class="menu-item">
                        <span class="icon">🍞</span>
                        <span>Maná</span>
                    </a>
                    <a href="../a_imagen_de_Dios/index.html" class="menu-item">
                        <span class="icon">🎓</span>
                        <span>A Imagen</span>
                    </a>
                    <a href="../aposento/index.html" class="menu-item">
                        <span class="icon">🔥</span>
                        <span>Aposento</span>
                    </a>
                    <a href="../huellas/index.html" class="menu-item">
                        <span class="icon huellas">👣</span>
                        <span>Huellas</span>
                    </a>
                    <a href="../notas/index.html" class="menu-item">
                        <span class="icon">📝</span>
                        <span>Escriba</span>
                    </a>
                </div>
            </div>
        </div>

        <div id="search-results" class="search-results-list hidden"></div>
        
    </div>
    
    <div id="status-log" style="color: white; font-size: 12px; padding: 5px;"></div>

    <div id="place-visor" class="hidden">
        <div class="sheet-handle"></div> <div class="sheet-container">
            <button class="btn-close-visor" onclick="cerrarVisor()">
                <i class="fas fa-times"></i>
            </button>

            <header class="visor-header">
                <div class="img-wrapper">
                    <img id="p-img" src="" alt="Imagen del lugar" onclick="abrirLightbox(this.src)">
                    <div class="img-overlay">
                        <h1 id="p-nombre"></h1>
                        <p id="p-subtitulo"></p>
                    </div>
                </div>
            </header>

            <nav class="visor-tabs">
                <button class="tab-btn active" data-tab="narrativa">Narrativa</button>
                <button class="tab-btn" data-tab="analisis">Análisis</button>
                <button class="tab-btn" data-tab="contexto">Contexto</button>
            </nav>

            <main class="visor-content">
                <div id="tab-content">
                    </div>
            </main>

            <footer class="visor-footer">
                <div class="share-title">Propagar la Palabra</div>
                <div class="action-buttons">
                    <button class="btn-action wa" onclick="compartir('whatsapp')" title="Compartir en WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </button>
                    <button class="btn-action fb" onclick="compartir('facebook')" title="Compartir en Facebook">
                        <i class="fab fa-facebook"></i>
                    </button>
                    <button class="btn-action copy" onclick="compartir('copiar')" title="Copiar Enlace">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                    </button>
                    <button class="btn-action nota" onclick="irAEscriba()" title="Añadir a mis notas">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <div id="lightbox" class="hidden" onclick="this.classList.add('hidden')">
        <img id="lightbox-img" src="" alt="Full Screen">
        <p class="lightbox-caption">Toca para cerrar</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js" type="module"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Códice SW: Registrado con éxito en el ecosistema', reg.scope))
                    .catch(err => console.warn('Códice SW: Error al registrar', err));
            });
        }
    </script>
</body>
</html>
