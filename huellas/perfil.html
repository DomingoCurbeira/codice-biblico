    <header class="profile-header">
        <div class="avatar-container">
            <img id="p-foto" src="" class="avatar" alt="Perfil">
        </div>
        <h1 id="p-nombre" class="profile-name">...</h1>
        <div id="p-role" class="profile-role">...</div>
    </header>

    <main id="profile-view" class="cv-container">
        
        <div class="cv-card quote-card">
            <p id="p-resumen">...</p>
        </div>

        <div class="cv-card">
            <h3 class="cv-title">Expediente Personal</h3>
            <div class="data-grid-3">
                <div class="data-item">
                    <label>Ocupación</label>
                    <span id="p-ocupacion">-</span>
                </div>
                <div class="data-item">
                    <label>Origen / Lugares</label>
                    <span id="p-origen">-</span>
                </div>
                <div class="data-item">
                    <label>Familia</label>
                    <span id="p-familia">-</span>
                </div>
            </div>
        </div>

        <div class="cv-card">
            <h3 class="cv-title">Análisis de Carácter</h3>
            
            <div class="analysis-grid">
                <div class="analysis-col">
                    <label class="tag-label green">Fortalezas</label>
                    <ul id="p-fortalezas" class="list-bullet green-bullet"></ul>
                </div>
                
                <div class="analysis-col">
                    <label class="tag-label red">Debilidades</label>
                    <ul id="p-debilidades" class="list-bullet red-bullet"></ul>
                </div>
            </div>
        </div>

        <div class="cv-card">
            <h3 class="cv-title">Legado y Aprendizaje</h3>
            
            <div style="margin-bottom: 1.5rem;">
                <label class="tag-label yellow">💡 Lecciones de Vida</label>
                <ul id="p-lecciones" class="list-bullet yellow-bullet"></ul>
            </div>

            <div class="did-you-know-box">
                <span class="icon">🧐</span>
                <div>

                    <p id="p-curioso">...</p>
                </div>
            </div>
        </div>

            <div class="jc-header">
                <span style="font-size: 1.5rem;">✝</span>
                <h3>Conexión con Jesús</h3>
            </div>
            <p id="p-conexion" class="jc-text">...</p>
        </div>

        <div class="cv-card">
            <h3 class="cv-title">Cronología</h3>
            <div id="p-timeline"></div>
        </div>
