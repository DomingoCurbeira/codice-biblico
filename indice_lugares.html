<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🗺️ Generador de Índice de Lugares</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #3b82f6; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .status-panel { background: #1e293b; border-radius: 8px; padding: 20px; margin: 20px 0; border: 1px solid #334155; }
        .log-entry { margin-bottom: 8px; font-family: monospace; }
        .success { color: #10b981; }
        .error { color: #ef4444; background: #450a0a; padding: 5px; border-radius: 4px; }
        .warning { color: #f59e0b; }
        textarea { width: 100%; height: 350px; background: #000; color: #10b981; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; margin-top: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #2563eb; }
        .stats { margin-top: 10px; font-weight: bold; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗺️ Generador de Índice: Códice Cronos 4.0</h1>
    <p>Este script escanea los archivos de datos y genera un <code>indice_lugares.json</code> optimizado.</p>
    
    <button onclick="generarIndice()">🚀 GENERAR ÍNDICE GLOBAL</button>

    <div class="status-panel">
        <div id="status-log">Esperando inicio...</div>
        <div id="stats" class="stats"></div>
    </div>

    <h3>Salida JSON (indice_lugares.json)</h3>
    <textarea id="output" readonly placeholder="El JSON resultante aparecerá aquí..."></textarea>
</div>

<script>
    async function generarIndice() {
    const log = document.getElementById('status-log');
    const stats = document.getElementById('stats');
    const output = document.getElementById('output');
    
    log.innerHTML = "⏳ Iniciando proceso de indexación...<br>";
    const indexGlobal = [];
    let totalUbicaciones = 0;

    // Configuración de rutas y archivos
    const RUTA_DATOS = 'data/lugares/';
    const ARCHIVOS = [
        "pentateuco", 
        "historicos", 
        "poeticos", 
        "profetas_mayores", 
        "profetas_menores", 
        "evangelios", 
        "hechos"
    ];

    for (const nombreArchivo of ARCHIVOS) {
        try {
            const url = `${RUTA_DATOS}${nombreArchivo}.json?v=${Date.now()}`;
            const respuesta = await fetch(url);
            
            if (!respuesta.ok) {
                log.innerHTML += `<div class="error">❌ No se encontró: ${nombreArchivo}.json</div>`;
                continue;
            }

            const ubicaciones = await respuesta.json(); // Estructura: [ {id, perfil, mapa...}, {...} ]
            let conteoArchivo = 0;

            if (Array.isArray(ubicaciones)) {
                ubicaciones.forEach(lugar => {
                    // Extraemos los datos según tu estructura compartida
                    const id = lugar.id;
                    const nombre = lugar.perfil ? lugar.perfil.nombre : (lugar.nombre || "Sin nombre");
                    const titulo = lugar.perfil ? lugar.perfil.titulo_corto : "";
                    const coords = lugar.mapa ? lugar.mapa.coords : (lugar.coords || [0,0]);
                    const era = lugar.contexto ? lugar.contexto.era_biblica : "No definida";
                    const testamento = lugar.contexto ? lugar.contexto.testamento : "";

                    indexGlobal.push({
                        id: id,
                        nombre: nombre,
                        titulo: titulo,
                        archivo: `${nombreArchivo}.json`,
                        coords: coords,
                        era: era,
                        testamento: testamento,
                        tags: generarTags(lugar)
                    });
                    conteoArchivo++;
                    totalUbicaciones++;
                });
                log.innerHTML += `<div class="success">✅ ${nombreArchivo}.json: ${conteoArchivo} lugares indexados.</div>`;
            } else {
                log.innerHTML += `<div class="warning">⚠️ ${nombreArchivo}.json no es un Array válido.</div>`;
            }

        } catch (err) {
            log.innerHTML += `<div class="error">💥 Error en ${nombreArchivo}.json: ${err.message}</div>`;
        }
    }

    // Ordenar alfabéticamente
    indexGlobal.sort((a, b) => a.nombre.localeCompare(b.nombre));

    // Generar salida
    output.value = JSON.stringify(indexGlobal, null, 2);
    stats.innerHTML = `📊 Total indexado: ${totalUbicaciones} ubicaciones únicas detectadas.`;
    log.innerHTML += `<br><b>✨ ¡Proceso finalizado! Copia el JSON de abajo.</b>`;
}

function generarTags(lugar) {
    const tags = new Set();
    if (lugar.id) tags.add(lugar.id.replace(/-/g, ' '));
    if (lugar.perfil && lugar.perfil.nombre) tags.add(lugar.perfil.nombre.toLowerCase());
    if (lugar.contexto && lugar.contexto.libros_aparicion) {
        lugar.contexto.libros_aparicion.forEach(libro => tags.add(libro.toLowerCase()));
    }
    return Array.from(tags).join(', ');
}
</script>
</body>
</html>
