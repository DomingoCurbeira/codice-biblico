<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♂️ Auditor Total - Huellas & Cronos (Anti-Caché)</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
        h1 { color: #fcd34d; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { margin-top: 40px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom:5px; }
        .card { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; }
        .error { color: #ef4444; font-weight: bold; }
        .missing { border-left: 4px solid #ef4444; }
        .found { border-left: 4px solid #10b981; opacity: 0.7; }
        .badge { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-size: 0.8em; margin-right: 5px; }
        .sugerencia { color: #fcd34d; font-style: italic; font-size: 0.9em; margin-top: 5px; display: block; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #2563eb; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        #loading { display:none; color: #fcd34d; margin-top: 20px; font-weight: bold; }

        /* ESTILO NUEVO PARA EL CONTADOR */
        #scoreboard {
            display: none;
            background: #020617;
            border: 2px solid #334155;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            text-align: center;
        }
        .score-title { font-size: 1.1em; color: #94a3b8; margin-bottom: 10px; display: block; }
        .score-number { font-size: 4em; font-weight: bold; color: #ef4444; line-height: 1; }
        .score-good { color: #10b981; }
        .score-detail { font-size: 1.1em; color: #94a3b8; margin-top: 10px; }
        
        /* TABLA DE PRIORIDAD */
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ranking-table th { text-align: left; color: #fcd34d; border-bottom: 1px solid #334155; padding: 5px; }
        .ranking-table td { padding: 8px; border-bottom: 1px solid #1e293b; }
        .priority-high { color: #ef4444; font-weight: bold; }
        .count-badge { background: #334155; color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

    <h1>🕵️‍♂️ Auditor Total: Huellas + Cronos</h1>
    
    <div id="scoreboard">
        <span class="score-title">ARCHIVOS REALES QUE FALTAN</span>
        <span id="score-val" class="score-number">--</span>
        <div id="score-breakdown" class="score-detail"></div>
        
        <div id="priority-list"></div>
    </div>

    <p>Escanea vínculos rotos y sugiere dónde ubicar a los personajes faltantes.</p>
    
    <button onclick="iniciarAuditoria()">▶️ INICIAR ESCANEO (FORZAR RECARGA)</button>
    <div id="loading">⏳ Escaneando archivos frescos...</div>

    <div id="log-area"></div>

<script>
    // --- ⚙️ CONFIGURACIÓN DE RUTAS ---
    const URL_INDICE_HUELLAS = 'data/indices/indice_personajes.json'; 
    const URL_BASE_HUELLAS = 'data/personajes/';
    const URL_BASE_CRONOS = 'data/lugares/'; 

    async function iniciarAuditoria() {
        const log = document.getElementById('log-area');
        const loading = document.getElementById('loading');
        const scoreboard = document.getElementById('scoreboard');
        const scoreVal = document.getElementById('score-val');
        const scoreDetail = document.getElementById('score-breakdown');
        const priorityList = document.getElementById('priority-list');
        
        log.innerHTML = '';
        priorityList.innerHTML = '';
        loading.style.display = 'block';
        scoreboard.style.display = 'none';

        try {
            // 1. CARGAR DATOS DE HUELLAS (CON ANTI-CACHÉ)
            const resIndice = await fetch(URL_INDICE_HUELLAS + '?v=' + Date.now());
            if(!resIndice.ok) throw new Error("No encuentro el índice de personajes.");
            
            const indice = await resIndice.json();
            const gruposUnicos = [...new Set(Object.values(indice))];
            
            const promesas = gruposUnicos.map(async g => {
                const r = await fetch(`${URL_BASE_HUELLAS}${g}.json?v=${Date.now()}`);
                const data = await r.json();
                return data.map(p => ({ ...p, _archivo_origen: g }));
            });

            const resultados = await Promise.all(promesas);
            const todos = resultados.flat();

            // ----------------------------------------------------
            // 🕵️‍♂️ PARTE 1: PERSONAJES (Vínculos internos)
            // ----------------------------------------------------
            const censoIDs = new Set(todos.map(p => p.id));
            let htmlReporte = `<h2>1. Detalle de Errores Individuales</h2>`;
            let erroresTotalesLinks = 0;
            
            // OBJETO PARA CONTAR REPETICIONES DE FALTANTES
            let faltantesConteo = {}; 

            todos.forEach(p => {
                const relacionados = p.vinculos?.personajes_relacionados || [];
                relacionados.forEach(amigoId => {
                    const idLimpio = amigoId.trim(); 
                    if (!censoIDs.has(idLimpio)) {
                        erroresTotalesLinks++;
                        
                        // Contamos cuántas veces falta este personaje
                        if (faltantesConteo[idLimpio]) {
                            faltantesConteo[idLimpio]++;
                        } else {
                            faltantesConteo[idLimpio] = 1;
                        }

                        const archivoSugerido = p._archivo_origen;

                        htmlReporte += `
                            <div class="card missing">
                                <span class="error">❌ Vínculo Roto:</span>
                                <b>${p.perfil.nombre}</b> (${p.id}) intenta conectar con <span class="badge">${idLimpio}</span>.
                            </div>`;
                    }
                });
            });

            if (erroresTotalesLinks === 0) htmlReporte += '<div class="card found" style="border-color:#10b981">✨ ¡Perfecto! Todos los personajes están bien conectados.</div>';

            // ----------------------------------------------------
            // 🌍 PARTE 2: MAPAS DE CRONOS
            // ----------------------------------------------------
            htmlReporte += '<h2>2. Estado de Mapas en Cronos</h2>';
            
            const lugaresSet = new Set();
            todos.forEach(p => {
                const lugares = p.vinculos?.lugares || [];
                lugares.forEach(l => lugaresSet.add(l.trim()));
            });
            const lugaresUnicos = Array.from(lugaresSet).sort();
            
            // PREPARAR CONTADOR DE MAPAS FALTANTES
            let mapasFaltantesCount = 0;

            const promesasMapas = lugaresUnicos.map(async (nombreLugar) => {
                const slug = generarSlug(nombreLugar);
                const urlMapa = `${URL_BASE_CRONOS}${slug}.json?v=${Date.now()}`; 

                try {
                    const resp = await fetch(urlMapa, { method: 'HEAD' }); 
                    
                    if (resp.ok) {
                        return { html: `<div class="card found">✅ ${nombreLugar}</div>`, error: false };
                    } else {
                        return { html: `<div class="card missing">❌ ${nombreLugar} <small>(${slug}.json)</small></div>`, error: true };
                    }
                } catch (err) {
                    return { html: `<div class="card missing">❌ Error verificando ${slug}</div>`, error: true };
                }
            });

            const resultadosMapasRaw = await Promise.all(promesasMapas);
            
            const htmlMapas = resultadosMapasRaw.map(r => r.html).join('');
            mapasFaltantesCount = resultadosMapasRaw.filter(r => r.error).length;

            htmlReporte += `<div class="grid">${htmlMapas}</div>`;

            // ----------------------------------------------------
            // 📊 CÁLCULOS FINALES Y VISUALIZACIÓN
            // ----------------------------------------------------
            
            // 1. Calcular archivos únicos de personajes que faltan
            const listaUnicaPersonajes = Object.entries(faltantesConteo)
                                          .sort((a, b) => b[1] - a[1]); // Ordenar por frecuencia
            
            const numPersonajesReales = listaUnicaPersonajes.length;
            const totalTrabajoReal = numPersonajesReales + mapasFaltantesCount;

            // 2. Renderizar el Scoreboard
            scoreVal.innerText = totalTrabajoReal;
            scoreDetail.innerHTML = `
                Archivos JSON a crear: <b style="color:#fcd34d">${numPersonajesReales} personajes</b> + <b style="color:#fcd34d">${mapasFaltantesCount} mapas</b><br>
                <small>(Aunque veas ${erroresTotalesLinks} vínculos rotos en total)</small>
            `;

            if (totalTrabajoReal === 0) {
                scoreVal.className = "score-number score-good";
                scoreVal.innerText = "0";
                scoreDetail.innerText = "¡Todo limpio! No hay enlaces rotos.";
            } else {
                scoreVal.className = "score-number";
            }

            // 3. GENERAR TABLA DE PRIORIDAD (TOP 10 URGENTES)
            if (numPersonajesReales > 0) {
                let tablaHTML = `
                    <div style="background:#1e293b; padding:15px; border-radius:8px; margin-top:15px; text-align:left;">
                    <h3 style="margin-top:0; color:#fcd34d">🔥 TOP 10 URGENTES (Los más solicitados)</h3>
                    <p style="font-size:0.9em; color:#94a3b8">Si creas estos archivos, eliminarás la mayoría de los errores:</p>
                    <table class="ranking-table">
                        <tr><th>ID del Archivo (JSON)</th><th>Vínculos que arreglará</th></tr>
                `;

                // Mostrar solo los top 10 o todos si son menos
                const topShow = listaUnicaPersonajes.slice(0, 10);
                
                topShow.forEach(([id, count]) => {
                    tablaHTML += `
                        <tr>
                            <td class="priority-high">${id}</td>
                            <td><span class="count-badge">arregla ${count} errores</span></td>
                        </tr>
                    `;
                });
                
                if(listaUnicaPersonajes.length > 10) {
                    tablaHTML += `<tr><td colspan="2" style="text-align:center; color:#64748b">...y ${listaUnicaPersonajes.length - 10} archivos más con menos prioridad.</td></tr>`;
                }

                tablaHTML += `</table></div>`;
                priorityList.innerHTML = tablaHTML;
            }

            log.innerHTML = htmlReporte;
            scoreboard.style.display = 'block';

        } catch (e) {
            console.error(e);
            log.innerHTML = `<p class="error">💥 ERROR CRÍTICO: ${e.message}</p>`;
        } finally {
            loading.style.display = 'none';
        }
    }

    function generarSlug(texto) {
        return texto.toString().toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") 
            .replace(/\s+/g, '-')           
            .replace(/[^\w\-]+/g, '')       
            .replace(/\-\-+/g, '-')         
            .replace(/^-+/, '')             
            .replace(/-+$/, '');            
    }
    
</script>
<script>
    // 🧹 LIMPIADOR DE SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
                registration.unregister();
                console.log("🧹 Service Worker eliminado para evitar caché.");
            }
        });
    }
</script>
</body>
</html>
