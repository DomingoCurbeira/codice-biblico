<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🧭 Auditor Cronos - Biblioteca Completa (Anti-Caché)</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 20px; }
        h1 { color: #d4b483; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { margin-top: 40px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom:5px; }
        .card { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; }
        .error { color: #ef4444; font-weight: bold; }
        .missing { border-left: 4px solid #ef4444; }
        .found { border-left: 4px solid #10b981; opacity: 0.7; }
        .badge { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-size: 0.8em; margin-right: 5px; color: #d4b483; }
        .badge-char { color: #60a5fa; }
        .sugerencia { color: #fcd34d; font-style: italic; font-size: 0.9em; margin-top: 5px; display: block; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #d4b483; color: #0f172a; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #b09060; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
        #loading { display:none; color: #fcd34d; margin-top: 20px; font-weight: bold; }

        /* TABLA DE PUNTUACIÓN */
        #scoreboard {
            display: none;
            background: #020617;
            border: 2px solid #334155;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            text-align: center;
        }
        .score-title { font-size: 1.1em; color: #94a3b8; margin-bottom: 10px; display: block; }
        .score-number { font-size: 3em; font-weight: bold; color: #ef4444; }
        .score-good { color: #10b981; }
        .score-detail { font-size: 0.9em; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🧭 Auditor Cronos: Biblioteca Completa</h1>
    
    <div id="scoreboard">
        <span class="score-title">ENLACES ROTOS EN TODA LA BIBLIOTECA</span>
        <span id="score-val" class="score-number">--</span>
        <div id="score-breakdown" class="score-detail"></div>
    </div>

    <p>Escanea todos los archivos de libros (Pentateuco, Históricos, Evangelios, etc.) y verifica las conexiones globales.</p>
    
    <button onclick="iniciarAuditoria()">▶️ INICIAR ESCANEO GLOBAL</button>
    <div id="loading">⏳ Descargando y fusionando archivos de mapas...</div>

    <div id="log-area"></div>

<script>
    // --- ⚙️ CONFIGURACIÓN DE RUTAS ---
    const URL_INDICE_PERSONAJES = 'data/indices/indice_personajes.json'; 
    const URL_INDICE_LUGARES = 'data/indices/indice_lugares.json'; 
    const URL_BASE_LUGARES = 'data/lugares/';

    // 📚 LISTA DE TODOS TUS ARCHIVOS JSON
    const ARCHIVOS_BIBLIOTECA = [
        'pentateuco.json',
        'historicos.json',
        'poeticos.json',
        'profetas_mayores.json',
        'profetas_menores.json',
        'evangelios.json',
        'hechos.json'
    ];

    async function iniciarAuditoria() {
        const log = document.getElementById('log-area');
        const loading = document.getElementById('loading');
        const scoreboard = document.getElementById('scoreboard');
        const scoreVal = document.getElementById('score-val');
        const scoreDetail = document.getElementById('score-breakdown');
        
        log.innerHTML = '';
        loading.style.display = 'block';
        scoreboard.style.display = 'none';

        let erroresLugares = 0;
        let erroresPersonajes = 0;

        try {
            // 1. CARGAR ÍNDICES MAESTROS
            const [resIndPersonajes, resIndLugares] = await Promise.all([
                fetch(URL_INDICE_PERSONAJES + '?v=' + Date.now()),
                fetch(URL_INDICE_LUGARES + '?v=' + Date.now()).catch(() => null)
            ]);

            if(!resIndPersonajes.ok) throw new Error("No encuentro el índice de personajes (Huellas).");
            
            const indicePersonajes = await resIndPersonajes.json();
            const censoPersonajesValidos = new Set(Object.keys(indicePersonajes));

            // 2. DESCARGAR TODOS LOS ARCHIVOS DE LUGARES EN PARALELO
            const promesasArchivos = ARCHIVOS_BIBLIOTECA.map(async (archivo) => {
                try {
                    const res = await fetch(`${URL_BASE_LUGARES}${archivo}?v=${Date.now()}`);
                    if (!res.ok) {
                        console.error(`Falta el archivo: ${archivo}`);
                        return []; // Si falta un archivo, devolvemos un array vacío para que no rompa el resto
                    }
                    const data = await res.json();
                    
                    // Opcional: inyectar a cada lugar el nombre del archivo de donde vino (para el reporte)
                    return data.map(lugar => ({ ...lugar, _origen: archivo }));
                } catch (e) {
                    console.error(`Error procesando ${archivo}:`, e);
                    return [];
                }
            });

            const arraysDeLugares = await Promise.all(promesasArchivos);
            
            // 3. FUSIONAR TODOS LOS ARRAYS EN UNO SOLO (.flat() une arrays anidados en uno de un solo nivel)
            const lugaresData = arraysDeLugares.flat();
            
            if (lugaresData.length === 0) {
                throw new Error("No se pudo cargar ningún lugar de los archivos especificados.");
            }

            // 4. CONSTRUIR EL CENSO DE LUGARES VÁLIDOS
            const censoLugaresValidos = new Set();
            
            // Registramos todos los IDs que acabamos de descargar
            lugaresData.forEach(lugar => {
                if(lugar.id) censoLugaresValidos.add(lugar.id);
            });

            // Sumamos los del índice general (por si tienes mapas sueltos que no están en estos libros)
            if (resIndLugares && resIndLugares.ok) {
                const dataLugares = await resIndLugares.json();
                const listaIDsLugares = Array.isArray(dataLugares) ? dataLugares : Object.keys(dataLugares);
                listaIDsLugares.forEach(id => censoLugaresValidos.add(id));
            }

            // ----------------------------------------------------
            // 🗺️ PARTE 1: AUDITORÍA DE VÍNCULOS A OTROS LUGARES
            // ----------------------------------------------------
            let htmlLugares = `<h2>📍 1. Vínculos a otros Lugares (Total mapas auditados: ${lugaresData.length})</h2>`;
            let flagErrorLugares = false;

            lugaresData.forEach(lugar => {
                const vinculados = lugar.vinculos?.lugares_relacionados || [];
                vinculados.forEach(vLugar => {
                    const idLimpio = vLugar.trim();
                    if (!censoLugaresValidos.has(idLimpio)) {
                        erroresLugares++;
                        flagErrorLugares = true;
                        htmlLugares += `
                            <div class="card missing">
                                <span class="error">❌ Destino Fantasma:</span>
                                <b>${lugar.perfil?.nombre || lugar.id}</b> <span style="font-size:0.8em;color:#64748b;">(en ${lugar._origen})</span> 
                                apunta al lugar <span class="badge">${idLimpio}</span>, pero este ID no existe en ningún archivo.
                            </div>`;
                    }
                });
            });

            if (!flagErrorLugares) htmlLugares += '<div class="card found" style="border-color:#10b981">✨ ¡Excelente! Todos los vínculos de lugares apuntan a mapas reales.</div>';

            // ----------------------------------------------------
            // 👤 PARTE 2: AUDITORÍA DE VÍNCULOS A PERSONAJES
            // ----------------------------------------------------
            let htmlPersonajes = `<h2>👤 2. Vínculos a Personajes (Huellas)</h2>`;
            let flagErrorPersonajes = false;

            lugaresData.forEach(lugar => {
                const personajesRel = lugar.vinculos?.personajes_relacionados || [];
                personajesRel.forEach(pId => {
                    const idLimpio = pId.trim();
                    if (!censoPersonajesValidos.has(idLimpio)) {
                        erroresPersonajes++;
                        flagErrorPersonajes = true;
                        htmlPersonajes += `
                            <div class="card missing">
                                <span class="error">❌ Personaje No Encontrado:</span>
                                <b>${lugar.perfil?.nombre || lugar.id}</b> <span style="font-size:0.8em;color:#64748b;">(en ${lugar._origen})</span> 
                                invoca a <span class="badge badge-char">${idLimpio}</span>, pero no está en la base de datos de Huellas.
                            </div>`;
                    }
                });
            });

            if (!flagErrorPersonajes) htmlPersonajes += '<div class="card found" style="border-color:#10b981">✨ ¡Perfecto! Todos los personajes mencionados en los lugares existen.</div>';

            // Renderizar reportes
            log.innerHTML = htmlLugares + htmlPersonajes;

            // --- ACTUALIZAR MARCADOR ---
            const totalErrores = erroresLugares + erroresPersonajes;
            scoreVal.innerText = totalErrores;
            
            if (totalErrores === 0) {
                scoreVal.className = "score-number score-good";
                scoreVal.innerText = "0";
                scoreDetail.innerText = "¡Todo conectado a la perfección en todos los libros!";
            } else {
                scoreVal.className = "score-number";
                scoreDetail.innerText = `(Mapas rotos: ${erroresLugares} | Personajes rotos: ${erroresPersonajes})`;
            }
            scoreboard.style.display = 'block';

        } catch (e) {
            console.error(e);
            log.innerHTML = `<p class="error">💥 ERROR CRÍTICO: ${e.message}</p>`;
        } finally {
            loading.style.display = 'none';
        }
    }
</script>
<script>
    // 🧹 LIMPIADOR DE SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
                registration.unregister();
            }
        });
    }
</script>
</body>
</html>
