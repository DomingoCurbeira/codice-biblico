<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♂️ Auditor Maestro - Huellas & Cronos</title>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { color: #fcd34d; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { margin-top: 40px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom:5px; font-size: 1.2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        
        .card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; position: relative; }
        .card.missing { border-left: 4px solid #ef4444; } /* Rojo: Falta */
        .card.found { border-left: 4px solid #10b981; } /* Verde: Exacto */
        .card.partial { border-left: 4px solid #f59e0b; } /* Naranja: Parecido */

        .badge { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-size: 0.75em; color: #cbd5e1; margin-top: 5px;}
        .badge-book { background: #3b82f6; color: white; }

        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 5px; font-weight: bold; width: 100%; transition: background 0.2s;}
        button:hover { background: #2563eb; }
        
        #loading { display:none; text-align: center; padding: 20px; color: #fcd34d; font-weight: bold; font-size: 1.1rem; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>🕵️‍♂️ Auditor Maestro: Huellas + Libros.json</h1>
    <p>Escanea los vínculos de personajes en Huellas y verifica si existen en tu archivo central <code>libros.json</code>.</p>
    
    <button onclick="iniciarAuditoria()">▶️ INICIAR ESCANEO</button>
    <div id="loading">⏳ Cargando bases de datos...</div>

    <div id="log-area"></div>

<script>
    // --- ⚙️ CONFIGURACIÓN DE RUTAS ---
    // Ajusta estas rutas según dónde tengas los archivos
    const URL_INDICE_HUELLAS = 'data/indices/indice_personajes.json'; 
    const URL_BASE_HUELLAS = 'data/personajes/';
    
    // 📍 UBICACIÓN DE TU ARCHIVO DE LIBROS
    // Si auditoria.html está en la raíz, y libros.json también, pon solo 'libros.json'
    const URL_LIBROS = 'data/libros.json'; 

    async function iniciarAuditoria() {
        const log = document.getElementById('log-area');
        const loading = document.getElementById('loading');
        log.innerHTML = '';
        loading.style.display = 'block';

        try {
            // ----------------------------------------------------
            // PASO 1: LEER LIBROS.JSON (Crear índice de mapas reales)
            // ----------------------------------------------------
            const mapasEncontrados = []; 
            
            const resLibros = await fetch(URL_LIBROS);
            if (!resLibros.ok) throw new Error(`No se pudo cargar ${URL_LIBROS}`);
            const dataLibros = await resLibros.json();

            // Recorremos el array de libros
            dataLibros.forEach(libro => {
                if (libro.lugares && Array.isArray(libro.lugares)) {
                    libro.lugares.forEach(lugar => {
                        if (lugar.nombre) {
                            mapasEncontrados.push({
                                nombre: lugar.nombre.trim(),
                                libro: libro.titulo, // Ej: "Mateo"
                                id_libro: libro.id,  // Ej: "mateo"
                                clean: limpiarTexto(lugar.nombre)
                            });
                        }
                    });
                }
            });

            // ----------------------------------------------------
            // PASO 2: LEER HUELLAS (Ver qué lugares piden los personajes)
            // ----------------------------------------------------
            const resIndice = await fetch(URL_INDICE_HUELLAS);
            const indice = await resIndice.json();
            const gruposUnicos = [...new Set(Object.values(indice))];
            
            const promesasHuellas = gruposUnicos.map(g => fetch(`${URL_BASE_HUELLAS}${g}.json`).then(r => r.json()));
            const resultadosHuellas = await Promise.all(promesasHuellas);
            const todosPersonajes = resultadosHuellas.flat();

            // Sacar lista única de lugares solicitados
            const demandaLugares = new Set();
            todosPersonajes.forEach(p => {
                if (p.vinculos?.lugares) {
                    p.vinculos.lugares.forEach(l => demandaLugares.add(l.trim()));
                }
            });

            // ----------------------------------------------------
            // PASO 3: EL CRUCE (Comparación)
            // ----------------------------------------------------
            let htmlResultados = `<div class="stats">
                <span>📚 Libros analizados: ${dataLibros.length}</span>
                <span>🗺️ Mapas totales en sistema: ${mapasEncontrados.length}</span>
                <span>🔍 Lugares solicitados por personajes: ${demandaLugares.size}</span>
            </div>`;
            
            htmlResultados += '<h2>Resultados de Coincidencia de Mapas</h2><div class="grid">';

            const listaDemanda = Array.from(demandaLugares).sort();

            listaDemanda.forEach(lugarBuscado => {
                const buscadoClean = limpiarTexto(lugarBuscado);
                
                // Buscamos si algún mapa de Libros.json coincide
                const coincidencia = mapasEncontrados.find(m => 
                    m.clean === buscadoClean || 
                    m.clean.includes(buscadoClean) || 
                    buscadoClean.includes(m.clean)
                );

                if (coincidencia) {
                    // --- ENCONTRADO ✅ ---
                    const esExacto = m => m.clean === buscadoClean;
                    const clase = esExacto(coincidencia) ? 'found' : 'partial';
                    const icono = esExacto(coincidencia) ? '✅' : '⚠️';
                    const textoExtra = esExacto(coincidencia) ? '' : `<br><small style="color:#fcd34d">Coincide con: "${coincidencia.nombre}"</small>`;

                    htmlResultados += `
                        <div class="card ${clase}">
                            <strong>${icono} ${lugarBuscado}</strong>
                            ${textoExtra}
                            <div style="margin-top:8px;">
                                <span class="badge badge-book">📖 ${coincidencia.libro}</span>
                            </div>
                        </div>`;
                } else {
                    // --- NO ENCONTRADO ❌ ---
                    htmlResultados += `
                        <div class="card missing">
                            <strong>❌ ${lugarBuscado}</strong><br>
                            <small style="color:#94a3b8">No existe en libros.json</small>
                        </div>`;
                }
            });

            htmlResultados += '</div>';
            log.innerHTML = htmlResultados;

        } catch (e) {
            console.error(e);
            log.innerHTML = `<p style="color:#ef4444; font-size:1.2rem;">💥 ERROR: ${e.message}</p>`;
        } finally {
            loading.style.display = 'none';
        }
    }

    // Limpia tildes y mayúsculas para comparar mejor (ej: "Jericó" == "jerico")
    function limpiarTexto(txt) {
        return txt.toString().toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .trim();
    }
</script>
</body>
</html>
