<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🕵️‍♂️ Auditor Profundo - Huellas & Cronos</title>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { color: #fcd34d; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        h2 { margin-top: 40px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom:5px; font-size: 1.2rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        
        .card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; position: relative; }
        .card.missing { border-left: 4px solid #ef4444; } /* Rojo: Falta */
        .card.found { border-left: 4px solid #10b981; } /* Verde: Exacto */
        .card.partial { border-left: 4px solid #f59e0b; } /* Naranja: Parecido */

        .badge { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 4px; font-size: 0.75em; color: #cbd5e1; margin-top: 5px;}
        
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 5px; font-weight: bold; width: 100%; transition: background 0.2s;}
        button:hover { background: #2563eb; }
        
        #loading { display:none; text-align: center; padding: 20px; color: #fcd34d; font-weight: bold; font-size: 1.1rem; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>🕵️‍♂️ Auditor Profundo de Ecosistema</h1>
    <p>Escanea vínculos de personajes y busca dentro de los archivos de libros de Cronos (ej: mateo.json) para encontrar coincidencias de lugares.</p>
    
    <button onclick="iniciarAuditoria()">▶️ INICIAR ESCANEO PROFUNDO</button>
    <div id="loading">⏳ Abriendo libros de Cronos y analizando mapas...</div>

    <div id="log-area"></div>

<script>
    // --- ⚙️ CONFIGURACIÓN ---
    const URL_INDICE_HUELLAS = 'data/indices/indice_personajes.json'; 
    const URL_BASE_HUELLAS = 'data/personajes/';
    const URL_BASE_CRONOS = 'data/lugares/'; // Carpeta donde están mateo.json, exodo.json, etc.

    // 📚 LISTA DE ARCHIVOS A BUSCAR EN CRONOS
    // Como no podemos "listar" la carpeta, intentaremos abrir estos archivos comunes.
    // Si tienes archivos con otros nombres (ej: "rutas-pablo.json"), agrégalos a esta lista.
    const ARCHIVOS_CRONOS = [
        // Pentateuco
        "genesis", "exodo", "levitico", "numeros", "deuteronomio",
        // Históricos
        "josue", "jueces", "rut", "1samuel", "2samuel", "1reyes", "2reyes", "1cronicas", "2cronicas", "esdras", "nehemias", "ester",
        // Poéticos
        "job", "salmos", "proverbios", "eclesiastes", "cantares",
        // Profetas Mayores
        "isaias", "jeremias", "lamentaciones", "ezequiel", "daniel",
        // Profetas Menores
        "oseas", "joel", "amos", "abdias", "jonas", "miqueas", "nahum", "habacuc", "sofonias", "hageo", "zacarias", "malaquias",
        // Evangelios y Hechos
        "mateo", "marcos", "lucas", "juan", "hechos",
        // Cartas y Revelación
        "romanos", "1corintios", "2corintios", "galatas", "efesios", "filipenses", "colosenses", 
        "1tesalonicenses", "2tesalonicenses", "1timoteo", "2timoteo", "tito", "filemon", 
        "hebreos", "santiago", "1pedro", "2pedro", "1juan", "2juan", "3juan", "judas", "apocalipsis"
    ];

    async function iniciarAuditoria() {
        const log = document.getElementById('log-area');
        const loading = document.getElementById('loading');
        log.innerHTML = '';
        loading.style.display = 'block';

        try {
            // ----------------------------------------------------
            // PASO 1: LEER CRONOS (Crear índice de mapas reales)
            // ----------------------------------------------------
            const mapasEncontrados = []; // Aquí guardaremos { nombre: "Río Jordán", archivo: "mateo.json" }
            let archivosLeidos = 0;

            const promesasCronos = ARCHIVOS_CRONOS.map(async (nombreArchivo) => {
                try {
                    const res = await fetch(`${URL_BASE_CRONOS}${nombreArchivo}.json`);
                    if (res.ok) {
                        const data = await res.json();
                        archivosLeidos++;
                        // Si el archivo tiene array "lugares", lo procesamos
                        if (data.lugares && Array.isArray(data.lugares)) {
                            data.lugares.forEach(lugar => {
                                if (lugar.nombre) {
                                    mapasEncontrados.push({
                                        nombre: lugar.nombre.trim(),
                                        archivo: `${nombreArchivo}.json`,
                                        clean: limpiarTexto(lugar.nombre) // Versión limpia para comparar
                                    });
                                }
                            });
                        }
                    }
                } catch (e) {
                    // Ignoramos errores de archivos que no existen (404)
                }
            });

            await Promise.all(promesasCronos);

            // ----------------------------------------------------
            // PASO 2: LEER HUELLAS (Ver qué se necesita)
            // ----------------------------------------------------
            const resIndice = await fetch(URL_INDICE_HUELLAS);
            const indice = await resIndice.json();
            const gruposUnicos = [...new Set(Object.values(indice))];
            
            const promesasHuellas = gruposUnicos.map(g => fetch(`${URL_BASE_HUELLAS}${g}.json`).then(r => r.json()));
            const resultadosHuellas = await Promise.all(promesasHuellas);
            const todosPersonajes = resultadosHuellas.flat();

            // Sacar lista única de lugares solicitados
            const demandaLugares = new Set();
            todosPersonajes.forEach(p => {
                if (p.vinculos?.lugares) {
                    p.vinculos.lugares.forEach(l => demandaLugares.add(l.trim()));
                }
            });

            // ----------------------------------------------------
            // PASO 3: EL CRUCE (Comparación)
            // ----------------------------------------------------
            let htmlResultados = `<div class="stats">
                <span>📚 Archivos Cronos escaneados: ${archivosLeidos}</span>
                <span>🗺️ Mapas totales disponibles: ${mapasEncontrados.length}</span>
                <span>🔍 Lugares solicitados por Huellas: ${demandaLugares.size}</span>
            </div>`;
            
            htmlResultados += '<div class="grid">';

            const listaDemanda = Array.from(demandaLugares).sort();

            listaDemanda.forEach(lugarBuscado => {
                const buscadoClean = limpiarTexto(lugarBuscado);
                
                // A) BUSQUEDA EXACTA O PARCIAL INTELIGENTE
                // Buscamos si algún mapa de Cronos contiene el nombre buscado
                const coincidencia = mapasEncontrados.find(m => 
                    m.clean === buscadoClean || 
                    m.clean.includes(buscadoClean) || 
                    buscadoClean.includes(m.clean)
                );

                if (coincidencia) {
                    // --- ENCONTRADO ✅ ---
                    // Determinamos si es exacto o parcial
                    const esExacto = m => m.clean === buscadoClean;
                    const clase = esExacto(coincidencia) ? 'found' : 'partial';
                    const icono = esExacto(coincidencia) ? '✅' : '⚠️';
                    const textoExtra = esExacto(coincidencia) ? '' : `<br><small style="color:#fcd34d">Coincidencia parcial con: "${coincidencia.nombre}"</small>`;

                    htmlResultados += `
                        <div class="card ${clase}">
                            <strong>${icono} ${lugarBuscado}</strong>
                            ${textoExtra}
                            <div class="badge">📂 ${coincidencia.archivo}</div>
                        </div>`;
                } else {
                    // --- NO ENCONTRADO ❌ ---
                    htmlResultados += `
                        <div class="card missing">
                            <strong>❌ ${lugarBuscado}</strong><br>
                            <small style="color:#94a3b8">No encontrado en ningún archivo json de Cronos.</small>
                        </div>`;
                }
            });

            htmlResultados += '</div>';

            // --- VINCULOS PERSONAJES (Bonus check) ---
            // (Mantenemos breve el check de personajes que ya tenías)
            // ... (Omitido para no saturar, pero si quieres lo agrego)

            log.innerHTML = htmlResultados;

        } catch (e) {
            console.error(e);
            log.innerHTML = `<p style="color:red">💥 ERROR: ${e.message}</p>`;
        } finally {
            loading.style.display = 'none';
        }
    }

    // Limpia tildes y mayúsculas para comparar mejor
    function limpiarTexto(txt) {
        return txt.toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .trim();
    }
</script>
</body>
</html>
